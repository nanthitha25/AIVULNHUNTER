services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aivulnhunter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/aivulnhunter
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    volumes:
      - ./reports:/app/reports

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    # Note: Using localhost:8000 for client-side browser requests to the backend.
    ports:
      - "3000:3000"

  mock_targets:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "9001:9001"

volumes:
  postgres_data:
